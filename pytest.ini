[pytest]
addopts = -q
env_files = .env
markers =
  smoke: quick health checks for CI
  module(name): module grouping/selection
  role_hr: HR-context tests
  role_it: IT-context tests
  role_employee: EMPLOYEE-context tests
  role_superadmin: SUPERADMIN-context tests
  role_l1: L1-context tests
  role_l2: L2-context tests
  role_store: STORE-context tests
