[pytest]
addopts = -q
env_files = .env
markers =
  smoke: quick health checks for CI
  contract: schema/shape checks
  negative: negative tests only
  regression: full or scheduled suites
  api: api tests
  module_documents: Documents module tests
  module_assets: Assets module tests
  module_announcements: Announcements module tests
  module_dashboard: Dashboard module tests
  module_onboarding: Employee Onboarding module tests
  module_attendance: Attendance module tests
  role(name): run test under a given role (superadmin, hr, employee, l1, l2, l3, store)
